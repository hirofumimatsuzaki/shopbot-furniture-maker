<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>p5.js 2カラムレイアウト</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.1/p5.js"></script>
    <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
</head>
<body>

    <div class="container">
        <div class="column left-column">
            <h2>📐 ShopBot用 カスタム家具生成</h2>
            
            <div class="control-section">
            
                <h3>寸法・設定の調整</h3>
                <div class="control-group">
                    <label for="furniture_type">家具の種類</label>
                    <select id="furniture_type">
                        <option value="chair">椅子 (カスタム)</option>
                        <option value="desk">机 (簡略)</option>
                        <option value="shelf">棚 (簡略)</option>
                        <option value="house">小屋 (簡略)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="material_thickness">材料の厚み</label>
                    <input type="number" id="material_thickness" value="12" min="1" max="50">
                    <span id="display_i">12 mm</span>
                </div>
            </div>

            <div class="control-section" id="chair-controls">
                <h3>椅子のカスタムパラメータ</h3>
                <div class="control-group">
                    <label for="s">座面横幅</label>
                    <input type="range" id="s" value="357" min="50" max="500">
                    <span id="display_s">80 mm</span>
                </div>
                <div class="control-group">
                    <label for="s2">側面横幅調整</label>
                    <input type="range" id="s2" value="420" min="-100" max="600">
                    <span id="display_s2">0 mm</span>
                </div>
                <div class="control-group">
                    <label for="s3">足長さ調整</label>
                    <input type="range" id="s3" value="300" min="-50" max="500">
                    <span id="display_s3">0 mm</span>
                </div>
                <div class="control-group">
                    <label for="s5">足細さ調整</label>
                    <input type="range" id="s5" value="-75" min="-200" max="200">
                    <span id="display_s5">0 mm</span>
                </div>
                <div class="control-group">
                    <label for="yp5">背もたれ長さ</label>
                    <input type="range" id="yp5" value="-280" min="-500" max="130">
                    <span id="display_yp5">100 mm</span>
                </div>
                <div class="control-group">
                    <label for="s6">座面厚み調整</label>
                    <input type="range" id="s6" value="80" min="-200" max="200">
                    <span id="display_s6">0 mm</span>
                </div>
                <div class="control-group">
                    <label for="s7">背もたれ角度</label>
                    <input type="range" id="s7" value="20" min="-200" max="200">
                    <span id="display_s7">0 mm</span>
                </div>
                <div class="control-group">
                    <label for="s8">背もたれ幅</label>
                    <input type="range" id="s8" value="-80" min="-200" max="200">
                    <span id="display_s8">0 mm</span>
                </div>
                <div class="control-group">
                    <label for="s11">座面角度</label>
                    <input type="range" id="s11" value="0" min="0" max="40">
                    <span id="display_s11">0 mm</span>
                </div>
                <div class="control-group">
                    <label for="s12">足先サイズ</label>
                    <input type="range" id="s12" value="45" min="1" max="60">
                    <span id="display_s12">0 mm</span>
                </div>
            </div>

            <div class="control-section" id="desk-controls" style="display:none;">
    <h3>机のカスタムパラメータ</h3>

    <div class="control-group">
        <label for="desk_width">横幅</label>
        <input type="range" id="desk_width" value="1820" min="182" max="3640">
        <span id="display_desk_width">1820 mm</span>
    </div>

    <div class="control-group">
        <label for="desk_depth">縦幅</label>
        <input type="range" id="desk_depth" value="910" min="91" max="1820">
        <span id="display_desk_depth">910 mm</span>
    </div>

    <div class="control-group">
        <label for="desk_leg_height">脚長</label>
        <input type="range" id="desk_leg_height" value="910" min="91" max="1820">
        <span id="display_desk_leg_height">910 mm</span>
    </div>

    <div class="control-group">
        <label for="desk_apron_height">幕板</label>
        <input type="range" id="desk_apron_height" value="182" min="18" max="364">
        <span id="display_desk_apron_height">182 mm</span>
    </div>

    <div class="control-group">
        <label for="desk_foot_width">足幅</label>
        <input type="range" id="desk_foot_width" value="200" min="1" max="1000">
        <span id="display_desk_foot_width">200 mm</span>
    </div>

    <div class="control-group">
        <label for="desk_leg1_right">脚1右</label>
        <input type="range" id="desk_leg1_right" value="250" min="1" max="1000">
        <span id="display_desk_leg1_right">250 mm</span>
    </div>

    <div class="control-group">
        <label for="desk_leg2_right">脚2右</label>
        <input type="range" id="desk_leg2_right" value="250" min="1" max="1000">
        <span id="display_desk_leg2_right">250 mm</span>
    </div>

    <div class="control-group">
        <label for="desk_leg1_left">脚1左</label>
        <input type="range" id="desk_leg1_left" value="250" min="1" max="1000">
        <span id="display_desk_leg1_left">250 mm</span>
    </div>

    <div class="control-group">
        <label for="desk_leg2_left">脚2左</label>
        <input type="range" id="desk_leg2_left" value="250" min="1" max="1000">
        <span id="display_desk_leg2_left">250 mm</span>
    </div>
</div>

<div class="control-section" id="shelf-controls" style="display:none;">
    <h3>棚のカスタムパラメータ</h3>

    <div class="control-group">
        <label for="shelf_thickness">厚み</label>
        <input type="range" id="shelf_thickness" value="12" min="12" max="120">
        <span id="display_shelf_thickness">12 mm</span>
    </div>

    <div class="control-group">
        <label for="shelf_width">横幅</label>
        <input type="range" id="shelf_width" value="650" min="650" max="16000">
        <span id="display_shelf_width">650 mm</span>
    </div>

    <div class="control-group">
        <label for="shelf_depth">奥行き</label>
        <input type="range" id="shelf_depth" value="400" min="400" max="12000">
        <span id="display_shelf_depth">400 mm</span>
    </div>

    <div class="control-group">
        <label for="shelf_foot_width">足幅</label>
        <input type="range" id="shelf_foot_width" value="50" min="50" max="1000">
        <span id="display_shelf_foot_width">50 mm</span>
    </div>

    <div class="control-group">
        <label for="shelf_leg_width">足幅2</label>
        <input type="range" id="shelf_leg_width" value="80" min="80" max="2000">
        <span id="display_shelf_leg_width">80 mm</span>
    </div>

    <div class="control-group">
        <label for="shelf_leg_height">足高さ</label>
        <input type="range" id="shelf_leg_height" value="546" min="-1000" max="1000">
        <span id="display_shelf_leg_height">546 mm</span>
    </div>

    <div class="control-group">
        <label for="shelf_joint_thickness">厚み2</label>
        <input type="range" id="shelf_joint_thickness" value="60" min="60" max="1000">
        <span id="display_shelf_joint_thickness">60 mm</span>
    </div>

    <div class="control-group">
        <label for="shelf_leg_height_2">足高さ2</label>
        <input type="range" id="shelf_leg_height_2" value="-410" min="-10000" max="10000">
        <span id="display_shelf_leg_height_2">-410 mm</span>
    </div>

    <div class="control-group">
        <label for="shelf_columns">棚横</label>
        <input type="range" id="shelf_columns" value="4" min="1" max="8" step="1">
        <span id="display_shelf_columns">4</span>
    </div>

    <div class="control-group">
        <label for="shelf_rows">棚縦</label>
        <input type="range" id="shelf_rows" value="4" min="1" max="8" step="1">
        <span id="display_shelf_rows">4</span>
    </div>

    <div class="control-group">
        <label for="shelf_joint_thickness_2">厚み3</label>
        <input type="range" id="shelf_joint_thickness_2" value="331" min="331" max="1000">
        <span id="display_shelf_joint_thickness_2">331 mm</span>
    </div>

    <div class="control-group">
        <label for="shelf_height_body">縦</label>
        <input type="range" id="shelf_height_body" value="1260" min="1260" max="16000">
        <span id="display_shelf_height_body">1260 mm</span>
    </div>
</div>
            
            <button id="download-button" class="download-btn">
                DXFデータ ダウンロード
            </button>
        </div>

        <div id="sketch-holder">
        <div class="column right-column" id="canvas-container">
            </div>
    </div>
    

    
    <script src="sketch.js"></script>
</div>
</body>
</html>
